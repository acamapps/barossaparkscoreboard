/* ROWS */
.row{

/* RATIO 1:1:1:2 */
.logo{flex:1; display:flex; align-items:center; justify-content:center;}
.goals,.behinds{flex:1; display:flex; align-items:center; justify-content:center; font-size:330px; font-weight:bold; color:white; line-height:1;}

/* SCORE PULSE */
@keyframes scorePulse{
  0%{transform:scale(1);}
  50%{transform:scale(1.2);}
  100%{transform:scale(1);}
}
.pulse{
  animation:scorePulse 1s ease;
}

@keyframes goalFlashHome{

@keyframes goalSlide {
  0%   { left:-100%; opacity:0; }
  10%  { opacity:1; }
  50%  { left:0%; opacity:1; }
  90%  { opacity:1; }
  100% { left:100%; opacity:0; }
}

.goalAnimate{
  animation: goalSlide 6s ease;
}

// --- Protection (obfuscated|base64-encoded) ---
const encodedPassword = "QnVsbGRvZ3NTY29yZXM=";

function decodeBase64(str) {
  return atob(str);
}

const entered = prompt("Enter password to access Footy Scoreboard:");
if (entered !== decodeBase64(encodedPassword)) {
  alert("Incorrect password. Access denied.");
  document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:20%'>Access Denied</h1>";
  throw new Error("Unauthorized access blocked.");
}

/* FULLSCREEN */
function goFullscreen(){
  let elem=document.documentElement;
  if(elem.requestFullscreen){ elem.requestFullscreen(); }
}
document.addEventListener("keydown", goFullscreen, { once:true });
document.addEventListener("click", goFullscreen, { once:true });

/* SCORE DATA */
let homeGoals=0, homeBehinds=0, awayGoals=0, awayBehinds=0;

/* CLOCK */
let clockSeconds=1200, timer=null;
window.countDown = true;
function formatTime(sec){ let m=Math.floor(sec/60), s=sec%60; return m+":"+String(s).padStart(2,"0"); }

function updateClock(){
  document.getElementById("clock").innerText = formatTime(clockSeconds);

  if(control && !control.closed && control.document && control.document.getElementById("controlClock")){
    control.document.getElementById("controlClock").innerText = formatTime(clockSeconds);
  }
}

function tick(){ if(window.countDown){ clockSeconds--; if(clockSeconds<0)clockSeconds=0;} else{ clockSeconds++; } updateClock();}
function startClock(){ if(timer)return; timer=setInterval(tick,1000); }
function stopClock(){ clearInterval(timer); timer=null; }
function resetClock(sec){ clockSeconds=sec; updateClock(); }

/* SCORING */
function calcTotal(g,b){ return g*6+b; }
function pulse(id){ let el=document.getElementById(id); el.classList.remove("pulse"); void el.offsetWidth; el.classList.add("pulse"); }

function refreshScores(){
  document.getElementById("homeGoals").innerText=homeGoals;
  document.getElementById("homeBehinds").innerText=homeBehinds;
  document.getElementById("homeTotal").innerText=calcTotal(homeGoals,homeBehinds);
  document.getElementById("awayGoals").innerText=awayGoals;
  document.getElementById("awayBehinds").innerText=awayBehinds;
  document.getElementById("awayTotal").innerText=calcTotal(awayGoals,awayBehinds);

  // Mirror on control panel
  if(control && !control.closed){
    control.document.getElementById("controlHomeGoals").innerText=homeGoals;
    control.document.getElementById("controlHomeBehinds").innerText=homeBehinds;
    control.document.getElementById("controlHomeTotal").innerText=calcTotal(homeGoals,homeBehinds);
    control.document.getElementById("controlAwayGoals").innerText=awayGoals;
    control.document.getElementById("controlAwayBehinds").innerText=awayBehinds;
    control.document.getElementById("controlAwayTotal").innerText=calcTotal(awayGoals,awayBehinds);
  }
}

/* SCORE CHANGE */
function changeScore(team,type,amount){

  // ---------------- HOME ----------------
  if(team=="home"){

    if(type=="goal"){

      homeGoals = Math.max(0, homeGoals + amount);

      if(amount > 0){
        showGoal(team);

        setTimeout(() => {

          refreshScores();

          pulse("homeGoals");
          pulse("homeTotal");

          let el = document.getElementById("homeTotal");
          el.classList.add("goalAnimationHome");
          setTimeout(() => {
            el.classList.remove("goalAnimationHome");
          }, 800);

        }, 5000); // must match overlay duration

        return;
      }

    }

    if(type=="behind"){
      homeBehinds = Math.max(0, homeBehinds + amount);
      pulse("homeBehinds");
      pulse("homeTotal");
    }
  }

  // ---------------- AWAY ----------------
  if(team=="away"){

    if(type=="goal"){

      awayGoals = Math.max(0, awayGoals + amount);

      if(amount > 0){
        showGoal(team);

        setTimeout(() => {

          refreshScores();

          pulse("awayGoals");
          pulse("awayTotal");

          let el = document.getElementById("awayTotal");
          el.classList.add("goalAnimationAway");
          setTimeout(() => {
            el.classList.remove("goalAnimationAway");
          }, 800);

        }, 5000); // must match overlay duration

        return;
      }

    }

    if(type=="behind"){
      awayBehinds = Math.max(0, awayBehinds + amount);
      pulse("awayBehinds");
      pulse("awayTotal");
    }
  }

  // ---------------- NON-GOAL UPDATES ----------------
  refreshScores();
}

function showGoal(team){
  const overlay = document.getElementById(team + "GoalOverlay");

  // remove old state
  overlay.classList.remove("goalAnimate", "goalHome", "goalAway");

  // set correct background
  overlay.classList.add(team === "home" ? "goalHome" : "goalAway");

  // restart animation
  void overlay.offsetHeight;
  overlay.classList.add("goalAnimate");

  setTimeout(() => {
    overlay.classList.remove("goalAnimate");
  }, 5000); // match slower timing if you increased duration
}
